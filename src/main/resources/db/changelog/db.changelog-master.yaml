databaseChangeLog:
  - changeSet:
      id: 1
      author: BB
      changes:
        - createTable:
            tableName: notification_task
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: chat_id
                  type: bigint
              - column:
                  name: message_text
                  type: varchar(255)
              - column:
                  name: notification_date
                  type: timestamp